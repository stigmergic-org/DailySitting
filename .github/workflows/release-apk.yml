name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate release signing secrets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          [ -n "$RELEASE_KEYSTORE_BASE64" ] || missing+=("RELEASE_KEYSTORE_BASE64")
          [ -n "$RELEASE_KEYSTORE_PASSWORD" ] || missing+=("RELEASE_KEYSTORE_PASSWORD")
          [ -n "$RELEASE_KEY_ALIAS" ] || missing+=("RELEASE_KEY_ALIAS")
          [ -n "$RELEASE_KEY_PASSWORD" ] || missing+=("RELEASE_KEY_PASSWORD")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing release signing secrets for tag build: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            mkdir -p app/signing
            printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > app/signing/release.jks
          fi

      - name: Build release APK
        env:
          RELEASE_KEYSTORE_FILE: ${{ github.workspace }}/app/signing/release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          SIGNING_ARGS=()
          if [ -f "$RELEASE_KEYSTORE_FILE" ]; then
            SIGNING_ARGS+=("-PDAILY_SITTING_KEYSTORE_FILE=$RELEASE_KEYSTORE_FILE")
            SIGNING_ARGS+=("-PDAILY_SITTING_KEYSTORE_PASSWORD=$RELEASE_KEYSTORE_PASSWORD")
            SIGNING_ARGS+=("-PDAILY_SITTING_KEY_ALIAS=$RELEASE_KEY_ALIAS")
            SIGNING_ARGS+=("-PDAILY_SITTING_KEY_PASSWORD=$RELEASE_KEY_PASSWORD")
          fi
          ./gradlew :app:assembleRelease "${SIGNING_ARGS[@]}"

      - name: Prepare APK artifact
        run: |
          set -euo pipefail
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" -print -quit)
          REF_NAME="${GITHUB_REF_NAME:-manual}"
          SAFE_REF_NAME="${REF_NAME//\//-}"
          APK_NAME="DailySitting-${SAFE_REF_NAME}.apk"
          cp "$APK_PATH" "$APK_NAME"
          printf 'APK_NAME=%s\n' "$APK_NAME" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-sitting-apk
          path: ${{ env.APK_NAME }}

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$APK_NAME" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$APK_NAME" \
              --title "Daily Sitting $GITHUB_REF_NAME" \
              --notes "Automated APK build for $GITHUB_REF_NAME." \
              --verify-tag
          fi
